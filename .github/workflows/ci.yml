name: CI

on:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: codescan
          POSTGRES_PASSWORD: codescan-dev-only-change-me
          POSTGRES_DB: codescan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codescan -d codescan"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_USER: codescan
      POSTGRES_PASSWORD: codescan-dev-only-change-me
      POSTGRES_DB: codescan
      DATABASE_URL: postgresql+asyncpg://codescan:codescan-dev-only-change-me@localhost:5432/codescan
      DATABASE_SYNC_URL: postgresql+psycopg://codescan:codescan-dev-only-change-me@localhost:5432/codescan
      JWT_SECRET: ci-test-jwt-secret-32-bytes-long
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install API dependencies
        run: uv sync --project apps/api --locked

      - name: Install worker dependencies
        run: uv sync --project apps/worker --locked

      - name: Install web dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Run API migrations
        run: cd apps/api && uv run alembic upgrade head

      - name: Lint
        run: make lint

      - name: Test
        run: make test
