name: CI

on:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Hard cap below the 10-minute AC for T5.5; the journey itself completes
    # in roughly 2-3 minutes under the configured slowMo with mocked Gemma.
    timeout-minutes: 10
    env:
      JWT_SECRET: e2e-jwt-secret-32-bytes-long-padding # gitleaks:allow
      GOOGLE_AI_API_KEY: mock-not-used # gitleaks:allow
      LLM_MOCK_MODE: "true"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install web dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: pnpm --dir apps/web exec playwright install --with-deps chromium

      - name: Build sample-repo fixture
        run: make e2e-fixtures

      - name: Bring up e2e compose stack
        run: make e2e-up

      - name: Wait for web to be reachable
        # The base compose healthcheck targets ``/scans`` which 401s while
        # unauthed; that still indicates the Next.js server is up. Loop
        # until we get any HTTP response (max 90s).
        run: |
          for i in $(seq 1 30); do
            if curl -sSf -o /dev/null --max-time 2 http://localhost:3000 \
              || curl -s -o /dev/null --max-time 2 http://localhost:3000 -w "%{http_code}\n" | grep -E "^(200|301|302|307|308|401|404)$" > /dev/null; then
              echo "web responded (attempt $i)"
              exit 0
            fi
            echo "waiting for web (attempt $i/30)…"
            sleep 3
          done
          echo "web never came up" >&2
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs web | tail -120
          exit 1

      - name: Run Playwright suite
        env:
          CI: "true"
        run: pnpm --dir apps/web exec playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs --no-color | tail -500

      - name: Tear down compose
        if: always()
        run: make e2e-down

  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: codescan
          POSTGRES_PASSWORD: codescan-dev-only-change-me
          POSTGRES_DB: codescan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codescan -d codescan"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_USER: codescan
      POSTGRES_PASSWORD: codescan-dev-only-change-me
      POSTGRES_DB: codescan
      DATABASE_URL: postgresql+asyncpg://codescan:codescan-dev-only-change-me@localhost:5432/codescan
      DATABASE_SYNC_URL: postgresql+psycopg://codescan:codescan-dev-only-change-me@localhost:5432/codescan
      JWT_SECRET: ci-test-jwt-secret-32-bytes-long
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install API dependencies
        run: uv sync --project apps/api --locked

      - name: Install worker dependencies
        run: uv sync --project apps/worker --locked

      - name: Install web dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Run API migrations
        run: cd apps/api && uv run alembic upgrade head

      - name: Lint
        run: make lint

      - name: Test
        run: make test
