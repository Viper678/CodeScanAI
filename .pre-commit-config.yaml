repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^apps/(api|worker)/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--strict]
        files: ^apps/(api|worker)/
        additional_dependencies:
          - fastapi==0.115.6
          - celery==5.4.0
          - redis==5.2.1
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^apps/web/
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: pnpm --dir apps/web exec eslint . --max-warnings=0
        language: system
        files: ^apps/web/
        pass_filenames: false
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
