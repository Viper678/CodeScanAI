services:
  web:
    build:
      context: ./codescan-frontend
    environment:
      # Read at request time by ``codescan-frontend/next.config.mjs``'s ``rewrites()``
      # — server-side proxy for ``/api/v1/*`` to the api service. Runtime
      # env var (NOT a build-arg) so one image deploys to UAT / prod /
      # future staging — see docs/GCP_MIGRATION.md §D4 + §M7.
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # ``/scans`` is a real authenticated route — Next.js prod server
      # returns 200 with the login redirect HTML (no auth needed for the
      # response itself, just for the underlying data). Works against
      # both the standalone prod image (this file) and the dev override
      # (``pnpm dev``), so the same probe survives the dev/prod swap.
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/scans').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./codescan-backend/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://codescan:codescan-dev-only-change-me@postgres:5432/codescan}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql+psycopg://codescan:codescan-dev-only-change-me@postgres:5432/codescan}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-14}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      DATA_DIR: ${DATA_DIR:-/data}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
      MAX_LOOSE_FILES: ${MAX_LOOSE_FILES:-50}
      MAX_LOOSE_FILE_SIZE_MB: ${MAX_LOOSE_FILE_SIZE_MB:-50}
      API_WORKERS: ${API_WORKERS:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Post-M7 the web proxy route handler strips inbound forwarded-IP
    # headers (X-Forwarded-For / X-Real-IP / Forwarded) and deliberately
    # does NOT inject its own. ``--proxy-headers`` is therefore unsafe
    # to enable here — it would trust whatever an adversary supplies
    # via X-Forwarded-For. The api falls back to ``request.client.host``
    # (the immediate TCP peer = web pod) for ``_client_ip()`` and the
    # auth rate limiter. That's a known regression vs the pre-M7 direct-
    # browser-to-api shape (rate-limit-per-pod, not per-browser); the
    # proper fix needs a trusted LB upstream of web that strips and re-
    # sets forwarded headers — tracked for §M8 / Phase B.
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
             --workers ${API_WORKERS:-2}"
    ports:
      - "8000:8000"
    volumes:
      - data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # T5.3: gate on dependency readiness, not just process liveness.
      # ``/readyz`` runs DB + Redis pings (2s budget per check, parallel)
      # so the worst-case probe is ~2s. ``start_period`` bumped to 30s —
      # cold starts now wait for the api process to come up *and* dial up
      # Postgres/Redis pools before the first probe is taken seriously.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./codescan-backend/worker
    environment:
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql+psycopg://codescan:codescan-dev-only-change-me@postgres:5432/codescan}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      DATA_DIR: ${DATA_DIR:-/data}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://vllm.llm.svc.cluster.local:8000/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      # ``LLM_MOCK_MODE=true`` in .env swaps the vLLM transport for canned
      # findings so a developer without a reachable vLLM can still exercise
      # the full security/bugs path locally. README's quick start references
      # this flag; without forwarding it here, .env would be silently ignored.
      LLM_MOCK_MODE: ${LLM_MOCK_MODE:-false}
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma-4-31b-it}
      RETENTION_DAYS: ${RETENTION_DAYS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # ``--beat`` runs an embedded scheduler in the same process so the
    # daily retention sweep (T5.2) ticks without standing up a separate
    # ``celery beat`` service. Fine for v1 — split into a sidecar if we
    # scale workers horizontally.
    # No ``--loglevel`` flag: the worker hijacks Celery's ``setup_logging``
    # signal (T5.4) so logging is fully driven by ``LOG_LEVEL`` env, and
    # the CLI flag would be a confusing no-op.
    command: ["uv", "run", "celery", "-A", "worker.celery_app", "worker", "--beat"]
    volumes:
      - data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run celery -A worker.celery_app inspect ping -d celery@$$HOSTNAME",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codescan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codescan-dev-only-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-codescan}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  data:
