services:
  web:
    command: pnpm dev
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    environment:
      WATCHPACK_POLLING: "true"

  api:
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/app

  worker:
    command: uv run celery -A worker.celery_app worker --loglevel=info
    volumes:
      - ./apps/worker:/app

  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  web_node_modules:
  web_next:
