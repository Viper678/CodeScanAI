# docker-compose override for the Playwright e2e suite (T5.5).
#
# Used as the SECOND ``-f`` after ``docker-compose.yml`` (NOT after the dev
# override) so the worker / api / web containers run the production-style
# images without live-reload mounts. The mock LLM transport is wired in via
# ``LLM_MOCK_MODE=true`` on the worker — no outbound Gemma traffic.
#
# Why an alt web port (3010): the dev stack binds ``3000`` on the host;
# running e2e on 3000 either collides with a dev stack running in the same
# checkout or — worse — silently hits it. The latter happens if a dev runs
# ``make e2e`` while ``docker compose up -d`` is already on 3000:
# Playwright connects to the dev stack with the real Gemma key, the
# canned-finding assertions fail with non-deterministic real-LLM output,
# and CI passes while local fails. Postgres / Redis don't need port
# overrides — the base file doesn't expose them, and the e2e overlay
# deliberately omits the dev override that does.
#
# Post-M7: the browser only talks to web (same-origin) and web's Next.js
# ``rewrites()`` proxy ``/api/v1/*`` to the api service over the internal
# compose network. The api container therefore doesn't need an alt host
# port — Playwright never dials api directly. ``INTERNAL_API_URL``
# inherits the base file's default (``http://api:8000/api/v1``).
#
# Invocation (handled by ``make e2e-up``):
#   docker compose -p codescan-e2e -f docker-compose.yml -f docker-compose.e2e.yml up -d --build
services:
  api:
    environment:
      # Same-origin rewrites mean the browser → web → api flow never
      # triggers CORS, but we keep this list set for defense-in-depth
      # (per docs/GCP_MIGRATION.md §M8) and for direct api consumers
      # (curl / scripts) that the e2e suite may grow over time. The
      # value reflects the web alt port (3010) the e2e stack pins.
      #
      # JSON-encoded list rather than the comma-separated form the
      # ``split_cors_origins`` validator handles: pydantic-settings
      # JSON-decodes ``list[str]`` env vars BEFORE validators run, so a
      # plain string like ``http://localhost:3010`` raises
      # ``SettingsError`` at api startup. The validator's intent is only
      # honored if the field carries a ``NoDecode`` annotation (latent
      # config bug, separate fix). JSON form sidesteps the parser.
      CORS_ALLOW_ORIGINS: '["http://localhost:3010"]'
    # api no longer needs a host port — Playwright reaches the api only
    # through web's same-origin rewrites over the internal compose
    # network. ``!override`` replaces the base file's ``ports`` rather
    # than merging with it (compose's default for sequence fields is
    # append) — without it, the e2e container would re-publish 8000:8000
    # and collide with a dev stack already on 8000.
    ports: !override []

  web:
    # See api ports comment — ``!override`` replaces 3000:3000 with the
    # e2e-only 3010:3000 binding. The browser hits ``http://localhost:3010``
    # and Next.js's ``rewrites()`` (apps/web/next.config.mjs) proxies
    # ``/api/v1/*`` to ``http://api:8000/api/v1/*`` server-side.
    ports: !override
      - "3010:3000"

  worker:
    environment:
      LLM_MOCK_MODE: "true"
      # LLM_BASE_URL is unused under mock mode — the mock transport is
      # wired in before any HTTP call is attempted. Inherits the base
      # compose file's default; no override needed.
